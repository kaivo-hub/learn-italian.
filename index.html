<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Italiano Pro V2 🇮🇹</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#f1f5f9;
color:#1e293b;
transition:.3s;
}

.dark{
background:#020617;
color:white;
}


header{

position:sticky;
top:0;
z-index:10;

background:white;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 7%;

box-shadow:0 5px 20px #ddd;

}


.dark header{
background:#0f172a;
}


.logo{

font-size:26px;
font-weight:bold;
color:#009246;

}


nav a{

text-decoration:none;
margin:10px;
color:#334155;

}


.dark nav a{
color:white;
}


button{

background:#009246;
color:white;

border:0;

padding:12px 25px;

border-radius:30px;

cursor:pointer;

}


.hero{

padding:80px 7%;
text-align:center;

}


.hero h1{

font-size:55px;

}


.hero span{

color:#ce2b37;

}


.hero p{

font-size:20px;
margin:25px;

}



.container{

padding:50px 7%;

}


.title{

text-align:center;
font-size:35px;
margin-bottom:35px;

}



.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}



.card{

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 10px 25px #ddd;

}


.dark .card{

background:#0f172a;

}



.stats{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

margin-top:40px;

}



.stat{

background:white;

padding:20px;

border-radius:20px;

}


.dark .stat{

background:#0f172a;

}



.flashcard{

height:180px;

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

cursor:pointer;

}



.lesson{

margin-bottom:15px;

}



.progress{

height:20px;

background:#cbd5e1;

border-radius:20px;

overflow:hidden;

}


.progress div{

height:100%;

background:#009246;

width:0%;

}



.quiz button{

margin:10px;

}



footer{

background:#0f172a;

color:white;

padding:30px;

text-align:center;

}



@media(max-width:700px){

.hero h1{

font-size:38px;

}

nav{

display:none;

}

}


</style>

</head>


<body>


<header>

<div class="logo">
🇮🇹 Italiano Pro
</div>


<nav>

<a href="#learn">Learn</a>
<a href="#words">Words</a>
<a href="#quiz">Quiz</a>
<a href="#profile">Profile</a>

</nav>


<button onclick="darkMode()">
🌙
</button>


</header>
